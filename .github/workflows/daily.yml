name: Daily Wattpad SMS Notifier

on:
  schedule:
    # 7 PM Central (CDT) = 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run notifier
        env:
          WATTPAD_USERNAME: ${{ secrets.WATTPAD_USERNAME }}
          PHONE_EMAIL: ${{ secrets.PHONE_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python wattpad_notifier.py

      - name: Commit and push stats
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add wattpad_stats.json
          git commit -m "Update daily wattpad stats" || echo "No changes to commit"
          git push
