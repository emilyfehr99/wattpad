# Daily Wattpad SMS at 7 PM Central (Email-to-SMS via carrier gateway)
name: Wattpad Daily SMS

on:
  schedule:
    # 7 PM Central (CDT) = 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Wattpad notifier (fetch stats + send SMS)
        env:
          WATTPAD_USERNAME: ${{ secrets.WATTPAD_USERNAME }}
          PHONE_EMAIL: ${{ secrets.PHONE_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python wattpad_notifier.py

      - name: Commit updated stats (and rankings if present)
        run: |
          git config user.email "action@github.com"
          git config user.name "github-actions[bot]"
          git add wattpad_stats.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Wattpad daily stats update $(date -u +%Y-%m-%d)"
          git push origin HEAD:main 2>/dev/null || true
        continue-on-error: true
