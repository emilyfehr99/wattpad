name: Daily Wattpad SMS Notifier

on:
  schedule:
    # 7:00 PM CST = 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run Wattpad Notifier
        run: python wattpad_notifier.py
        
      - name: Commit updated stats
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add wattpad_stats.json
          # Only commit if the file has changed
          git commit -m "Update daily wattpad stats" || echo "No changes to commit"
          git push
